name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-test:
    if: "!contains(github.event.head_commit.message, 'style: Spotless 자동 수정')"
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
      JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: JDK 21 세팅
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 세팅
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless 자동 수정
        run: ./gradlew spotlessApply || true

      - name: Spotless 수정사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Spotless 수정사항 없음"
          else
            git commit -m "style: Spotless 자동 수정"
            git push
          fi

      - name: 빌드 + 테스트
        id: build
        run: ./gradlew compileJava test 2>&1 | tee /tmp/build-output.txt; exit ${PIPESTATUS[0]}

      - name: PR 코멘트
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const success = '${{ job.status }}' === 'success';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = '';
            if (success) {
              body = '**CI 통과** — 빌드 및 테스트 성공';
            } else {
              let details = '';
              try {
                const output = fs.readFileSync('/tmp/build-output.txt', 'utf8');
                const errorLines = output.split('\n').filter(l =>
                  l.includes('FAILED') || l.includes('> Task') || l.match(/error:/)
                );
                details = errorLines.slice(0, 15).join('\n').trim();
              } catch(e) {}
              body = `**CI 실패** — [전체 로그 보기](${runUrl})`;
              if (details) body += `\n\n\`\`\`\n${details}\n\`\`\``;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
