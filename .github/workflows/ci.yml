name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: JDK 25 세팅
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 세팅
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless 자동 수정
        run: ./gradlew spotlessApply || true

      - name: Spotless 수정사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Spotless 수정사항 없음"
          else
            git commit -m "style: Spotless 자동 수정"
            git push
          fi

      - name: 빌드 + 테스트
        run: ./gradlew compileJava test
