name: Spotless (dev)

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  spotless-apply:
    # bot이 방금 푸시한 커밋이면 스킵 (무한 루프 방지)
    if: "github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '코드 포맷 자동 정리')"
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: JDK 21 세팅
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 세팅
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless 자동 수정
        run: ./gradlew spotlessApply

      - name: 수정사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "수정사항 없음"
          else
            git commit -m "style: 코드 포맷 자동 정리 — Google Java Format"
            git push
          fi
